name: Daily Sponsor Data Update

on:
  schedule:
    - cron: '0 7 * * 1-5'  # 7am UK time, Monday-Friday
  workflow_dispatch:         # also allows manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        run: python update_sponsors.py

      - name: Commit updated HTML
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update sponsors $(date +%Y-%m-%d)"
          git push

      - name: Trigger Netlify deploy
        run: curl -X POST -d '{}' https://api.netlify.com/build_hooks/69cd7c140fe066ec3118042e
