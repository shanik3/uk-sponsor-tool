<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0B0E13;--sf:#13161D;--sf2:#1A1E27;--sf3:#222733;--bd:#2A3040;--bdh:#3A4560;--tx:#EDF0F7;--tx2:#9AA0B4;--tx3:#636B80;--bl:#4B8DF8;--blb:#4B8DF815;--gn:#34D399;--gnb:#34D39915;--am:#FBBF24;--amb:#FBBF2415;--gy:#7B8298;--gyb:#7B829815;--rd:#F87171;--pu:#A78BFA;--pk:#F472B6;--r:12px;--rs:8px;--rx:6px;--sh:0 2px 12px rgba(0,0,0,0.3);--f:'DM Sans',system-ui,sans-serif;--m:'Space Mono',monospace}
[data-theme="light"]{--bg:#F4F6F9;--sf:#FFF;--sf2:#F0F2F5;--sf3:#E8EBF0;--bd:#D8DCE4;--bdh:#C0C6D0;--tx:#1A1D24;--tx2:#5A6070;--tx3:#8A90A0;--bl:#2563EB;--blb:#2563EB12;--gn:#059669;--gnb:#05966912;--am:#D97706;--amb:#D9770612;--gy:#6B7280;--gyb:#6B728012;--rd:#DC2626;--pu:#7C3AED;--pk:#DB2777;--sh:0 2px 12px rgba(0,0,0,0.08)}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh;transition:background .3s,color .3s}
a{color:var(--bl);text-decoration:none}
.w{max-width:1120px;margin:0 auto;padding:1.25rem}
.top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:1rem}
.top-l{display:flex;gap:4px;flex-wrap:wrap}.top-r{display:flex;gap:8px;align-items:center}
.p{padding:3px 10px;background:transparent;border:1px solid var(--bd);border-radius:16px;color:var(--tx3);font-size:.66rem;cursor:pointer;transition:all .2s;font-family:var(--f)}
.p:hover{border-color:var(--tx2);color:var(--tx2)}.p.on{background:var(--bl);color:#fff;border-color:var(--bl)}
.tog{width:34px;height:18px;border-radius:9px;border:1px solid var(--bd);background:var(--sf2);cursor:pointer;position:relative;transition:all .3s}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--tx3);transition:all .3s}
[data-theme="light"] .tog::after{left:18px;background:var(--am)}
.kbd-hint{font-size:.6rem;color:var(--tx3);font-family:var(--m);padding:2px 6px;border:1px solid var(--bd);border-radius:4px;display:none}
@media(min-width:768px){.kbd-hint{display:inline-block}}

header{text-align:center;padding:1.5rem 0 1rem;position:relative}
header::before{content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:350px;height:280px;background:radial-gradient(circle,var(--blb) 0%,transparent 70%);pointer-events:none;opacity:.5}
h1{font-family:var(--m);font-size:clamp(1.2rem,3vw,1.75rem);font-weight:700;letter-spacing:-.5px;line-height:1.2;margin-bottom:4px}
h1 b{background:linear-gradient(135deg,var(--bl),var(--gn));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{color:var(--tx2);font-size:.82rem}.bg{display:inline-block;margin-top:6px;padding:2px 10px;background:var(--sf);border:1px solid var(--bd);border-radius:14px;font-size:.65rem;color:var(--tx3);font-family:var(--m)}

.routes{display:flex;justify-content:center;gap:5px;margin:1rem 0;flex-wrap:wrap}
.rt{padding:5px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:16px;color:var(--tx2);font-size:.72rem;cursor:pointer;transition:all .15s;font-family:var(--f)}
.rt:hover{border-color:var(--tx3)}.rt.on{background:var(--bl);color:#fff;border-color:var(--bl)}
.rt .n{font-family:var(--m);margin-left:4px;opacity:.6;font-size:.65rem}

.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin:1rem 0}
@media(max-width:580px){.cards{grid-template-columns:repeat(2,minmax(0,1fr))}}
.cd{padding:.85rem;border-radius:var(--r);cursor:pointer;transition:all .2s;border:1.5px solid transparent;overflow:hidden}
.cd:hover{transform:translateY(-1px)}.cd.on{border-color:currentColor}.cd.dim{opacity:.22}
.cd .l{font-size:.7rem;opacity:.7;margin-bottom:2px;font-weight:500}
.cd .v{font-family:var(--m);font-size:1.3rem;font-weight:700}
.cL{background:var(--blb);color:var(--bl)}.cM{background:var(--gnb);color:var(--gn)}.cW{background:var(--amb);color:var(--am)}.cO{background:var(--gyb);color:var(--gy)}

.bc{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--tx3);margin-bottom:.5rem;flex-wrap:wrap}
.bc .s{opacity:.35}.bc .c{color:var(--tx);font-weight:500}.bc a{color:var(--bl)}

.bx{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:1rem;margin-bottom:.75rem}
.chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:.6rem}
.ch{padding:3px 10px;background:var(--sf2);border:1px solid var(--bd);border-radius:14px;color:var(--tx2);font-size:.7rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.ch:hover{border-color:var(--tx3)}.ch.on{background:var(--bl);color:#fff;border-color:var(--bl)}
.ch .ct{opacity:.5;margin-left:3px;font-family:var(--m);font-size:.62rem}

.tb{display:flex;align-items:center;gap:6px;margin-bottom:.5rem;flex-wrap:wrap}
.tb input{flex:1;min-width:150px;padding:7px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:.8rem;font-family:var(--f);outline:none;transition:border .2s}
.tb input:focus{border-color:var(--bl)}.tb input::placeholder{color:var(--tx3)}
.btn{padding:5px 12px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx2);font-size:.7rem;cursor:pointer;transition:all .15s;font-family:var(--f);white-space:nowrap;display:flex;align-items:center;gap:3px}
.btn:hover{background:var(--sf3);color:var(--tx)}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.cnt{font-size:.7rem;color:var(--tx3);font-family:var(--m);white-space:nowrap}

.lst{display:flex;flex-direction:column}
.rw{display:flex;align-items:center;padding:8px 10px;border-radius:var(--rx);transition:background .1s;gap:6px}
.rw:hover{background:var(--sf2)}
.rw .inf{min-width:0;flex:1}
.rw .nm{font-size:.8rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rw .mt{display:flex;gap:5px;align-items:center;margin-top:2px;flex-wrap:wrap}
.rw .co{font-size:.65rem;color:var(--tx3)}
.sc{font-size:.58rem;padding:2px 6px;border-radius:7px;font-weight:500;white-space:nowrap}
.sH{background:#3B82F620;color:#60A5FA}.sSC{background:#8B5CF620;color:#A78BFA}
.sE{background:#F59E0B20;color:#FBBF24}.sT{background:#22C55E20;color:#4ADE80}
.sF{background:#EF444420;color:#F87171}.sR{background:#EC489920;color:#F472B6}
.sC{background:#F9731620;color:#FB923C}.sTR{background:#06B6D420;color:#22D3EE}
.sFL{background:#6366F120;color:#818CF8}.sEN{background:#84CC1620;color:#A3E635}
.sO{background:#6B728020;color:#9CA3AF}
[data-theme="light"] .sH{color:#2563EB}[data-theme="light"] .sSC{color:#7C3AED}[data-theme="light"] .sE{color:#D97706}[data-theme="light"] .sT{color:#059669}[data-theme="light"] .sF{color:#DC2626}[data-theme="light"] .sR{color:#DB2777}[data-theme="light"] .sC{color:#EA580C}[data-theme="light"] .sTR{color:#0891B2}[data-theme="light"] .sFL{color:#4F46E5}[data-theme="light"] .sEN{color:#65A30D}[data-theme="light"] .sO{color:#6B7280}

.rw .ac{display:flex;gap:3px;flex-shrink:0;align-items:center;flex-wrap:wrap}
.ab{padding:3px 9px;border-radius:12px;font-size:.6rem;cursor:pointer;transition:all .12s;text-decoration:none;white-space:nowrap;border:1px solid var(--bd)}
.ab:hover{transform:scale(1.03)}
.ab-g{color:var(--bl)}.ab-g:hover{background:var(--bl);color:#fff;border-color:var(--bl)}
.ab-i{color:var(--gn)}.ab-i:hover{background:var(--gn);color:#fff;border-color:var(--gn)}
.ab-l{color:var(--pu)}.ab-l:hover{background:var(--pu);color:#fff;border-color:var(--pu)}
.ab-r{color:var(--am)}.ab-r:hover{background:var(--am);color:#fff;border-color:var(--am)}
.fv{background:none;border:none;cursor:pointer;font-size:14px;padding:1px;opacity:.25;transition:all .15s;line-height:1}
.fv:hover{opacity:.6}.fv.on{opacity:1}

/* Status tracker */
.st-sel{padding:2px 8px;border-radius:10px;font-size:.58rem;cursor:pointer;border:1px solid var(--bd);background:var(--sf2);color:var(--tx2);font-family:var(--f);transition:all .15s;appearance:none;-webkit-appearance:none;outline:none}
.st-sel:hover{border-color:var(--tx3)}
.st-ap{border-color:var(--bl);color:var(--bl);background:var(--blb)}
.st-iv{border-color:var(--pu);color:var(--pu);background:#A78BFA15}
.st-of{border-color:var(--gn);color:var(--gn);background:var(--gnb)}
.st-rj{border-color:var(--rd);color:var(--rd);background:#F8717115}

/* Notes */
.note-inp{width:100%;padding:4px 8px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rx);color:var(--tx);font-size:.7rem;font-family:var(--f);outline:none;resize:none;height:24px;transition:height .2s,border .2s}
.note-inp:focus{border-color:var(--bl);height:50px}

/* Favourites panel */
.fp{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:.85rem 1rem;margin-bottom:.75rem;display:none}
.fp.sh{display:block}
.fp-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;flex-wrap:wrap;gap:6px}
.fp-t{font-size:.82rem;font-weight:500}
.fp-a{display:flex;gap:5px}
.fp-l{display:flex;flex-direction:column;gap:2px}
.fi{display:flex;align-items:center;padding:6px 8px;border-radius:var(--rx);font-size:.78rem;gap:8px}
.fi:hover{background:var(--sf2)}
.fi .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fi .tw{color:var(--tx3);font-size:.68rem;white-space:nowrap}
.fi .st{font-size:.58rem;padding:2px 6px;border-radius:8px;white-space:nowrap}
.fi .nt{font-size:.62rem;color:var(--tx3);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fi .rm{background:none;border:none;color:var(--rd);cursor:pointer;font-size:12px;opacity:.4;padding:2px}.fi .rm:hover{opacity:1}

.inote{padding:.5rem .8rem;background:var(--sf2);border-radius:var(--rx);text-align:center;color:var(--tx3);font-size:.75rem;margin-top:.5rem}
.bk{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:14px;color:var(--tx2);font-size:.75rem;cursor:pointer;transition:all .15s;font-family:var(--f);margin-top:.5rem}
.bk:hover{background:var(--sf2);color:var(--tx)}
.sim{margin-top:.75rem;padding:.75rem;background:var(--sf2);border-radius:var(--rs);border:1px solid var(--bd)}
.sim-t{font-size:.72rem;font-weight:500;color:var(--tx2);margin-bottom:.4rem}
.sim-i{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.75rem}
.sim-i .n{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sim-i a{font-size:.62rem;color:var(--bl)}

.empty{padding:1.2rem;text-align:center;color:var(--tx3);font-size:.8rem}

.tp{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:1rem;margin-bottom:.75rem}
.tp-h{font-family:var(--m);font-size:.85rem;font-weight:700;margin-bottom:.75rem;display:flex;align-items:center;gap:8px}
.tp-h .badge-new{background:var(--gnb);color:var(--gn);padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:500}
.tp-stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:.75rem}
@media(max-width:520px){.tp-stats{grid-template-columns:repeat(2,minmax(0,1fr))}}
.tp-stat{padding:.6rem .75rem;background:var(--sf2);border-radius:var(--rs);text-align:center}
.tp-stat .n{font-family:var(--m);font-size:1.1rem;font-weight:700}.tp-stat .l{font-size:.65rem;color:var(--tx3);margin-top:2px}
.tp-stat.up .n{color:var(--gn)}.tp-stat.dn .n{color:var(--rd)}.tp-stat.nt .n{color:var(--bl)}
.tp-list{max-height:240px;overflow-y:auto;border:1px solid var(--bd);border-radius:var(--rs);padding:4px}
.tp-item{display:flex;align-items:center;gap:8px;padding:5px 8px;font-size:.75rem;border-radius:var(--rx)}
.tp-item:hover{background:var(--sf2)}
.tp-item .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tp-item .dot.add{background:var(--gn)}.tp-item .dot.rem{background:var(--rd)}
.tp-item .n{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tp-item .a{color:var(--tx3);font-size:.68rem;white-space:nowrap}
.tp-tabs{display:flex;gap:4px;margin-bottom:.5rem}
.tp-tab{padding:4px 12px;background:var(--sf2);border:1px solid var(--bd);border-radius:14px;font-size:.7rem;cursor:pointer;color:var(--tx2)}
.tp-tab.on{background:var(--bl);color:#fff;border-color:var(--bl)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(50px);background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);padding:7px 18px;font-size:.78rem;color:var(--tx);box-shadow:var(--sh);transition:transform .3s;z-index:99;pointer-events:none}
.toast.sh{transform:translateX(-50%) translateY(0)}

.credits{margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--bd);text-align:center}
.cr-n{font-family:var(--m);font-size:.85rem;font-weight:700;color:var(--tx);margin-bottom:4px}
.cr-r{font-size:.72rem;color:var(--tx2);margin-bottom:6px}
.cr-s{font-size:.68rem;color:var(--tx3)}
.cr-s a{color:var(--bl)}
footer{text-align:center;padding:1.25rem 0;color:var(--tx3);font-size:.68rem}

@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.an{animation:fu .2s ease forwards}
@media(max-width:480px){.rw .ac{flex-wrap:wrap}.ab{font-size:.55rem;padding:2px 7px}}

@media print{
  .top,.routes,.cards,.bx,.chips,.tb,.bc,.toast,.rw .ac,.fv,.st-sel,.note-inp,.btn,.bk,.sim,.rm-g,.rm-t,header::before{display:none!important}
  body{background:#fff!important;color:#000!important}
  .fp,.fp-l,.fi{display:block!important;background:none!important;border:none!important;color:#000!important}
  .fi{padding:4px 0;border-bottom:1px solid #ddd!important}
  .fi .nm,.fi .tw,.fi .st,.fi .nt{color:#000!important;white-space:normal!important;max-width:none!important}
  .credits{border-top:1px solid #ccc!important}
  .cr-n,.cr-r{color:#000!important}
  .cr-s{color:#666!important}
}
</style>

function renderC(){const el=$("rC");el.innerHTML="";const t=getCurTots();
  Object.keys(t).forEach(r=>{const d=document.createElement("div");
    d.className=`cd ${CK[r]} ${curR===r?"on":""} ${curR&&curR!==r?"dim":""}`;
    d.innerHTML=`<div class="l">${r}</div><div class="v">${t[r].toLocaleString()}</div>`;
    d.onclick=()=>showR(r);el.appendChild(d)})}

function setBc(parts){const el=$("bc");el.innerHTML="";parts.forEach((p,i)=>{
  if(i>0){const s=document.createElement("span");s.className="s";s.textContent="›";el.appendChild(s)}
  if(p.fn){const a=document.createElement("a");a.href="#";a.textContent=p.t;a.onclick=e=>{e.preventDefault();p.fn()};el.appendChild(a)}
  else{const s=document.createElement("span");s.className="c";s.textContent=p.t;el.appendChild(s)}})}

function isDk(){return document.documentElement.getAttribute('data-theme')!=='light'}
function chOpts(vertical){const dk=isDk();return{responsive:true,maintainAspectRatio:false,indexAxis:vertical?'y':'x',
  plugins:{legend:{display:false},tooltip:{backgroundColor:dk?"#1E2330":"#fff",titleColor:dk?"#EDF0F7":"#1A1D24",bodyColor:dk?"#9AA0B4":"#5A6070",borderColor:dk?"#2A3040":"#D8DCE4",borderWidth:1,cornerRadius:8,padding:10}},
  scales:{x:{grid:{color:dk?"#2A304030":"#D8DCE430"},ticks:{color:dk?"#636B80":"#8A90A0",callback:v=>v>=1000?Math.round(v/1000)+'k':v}},
    y:{grid:{display:vertical?false:undefined,color:vertical?undefined:(dk?"#2A304030":"#D8DCE430")},ticks:{color:dk?"#EDF0F7":"#1A1D24",font:{size:12,weight:500}}}}}}

function showOv(){curR=null;curT=null;curSec=null;$("pn").style.display="none";$("cB").style.display="block";
  renderC();setBc([{t:L.all}]);if(chart){chart.destroy();chart=null}
  const t=getCurTots(),lbl=Object.keys(t),v=lbl.map(l=>t[l]);
  $("ch").parentElement.style.minHeight="280px";
  const o=chOpts(false);o.onClick=(e,items)=>{if(items.length)showR(lbl[items[0].index])};
  o.plugins.tooltip.callbacks={label:c=>c.parsed.y.toLocaleString()+" "+L.sp};
  chart=new Chart($("ch"),{type:"bar",data:{labels:lbl,datasets:[{data:v,backgroundColor:lbl.map(l=>RC[l]),borderRadius:7,barPercentage:.55}]},options:o});
  $("ch").ontouchend=function(e){e.preventDefault();const h=chart.getElementsAtEventForMode(e.changedTouches[0],'nearest',{intersect:true},false);if(h.length)showR(lbl[h[0].index])};}

function showR(r){curR=r;curT=null;curSec=null;$("pn").style.display="none";$("cB").style.display="block";
  renderC();setBc([{t:L.all,fn:showOv},{t:r}]);if(chart){chart.destroy();chart=null}
  const towns=getCurData()[r]||[];if(!towns.length){$("cB").style.display="none";return}
  const lbl=towns.map(t=>t.n),v=towns.map(t=>t.c);
  $("ch").parentElement.style.minHeight=Math.max(280,towns.length*76+60)+"px";
  const o=chOpts(true);o.onClick=(e,items)=>{if(items.length)showT(r,towns[items[0].index])};
  o.plugins.tooltip.callbacks={label:c=>c.parsed.x.toLocaleString()+" — "+L.cl};
  chart=new Chart($("ch"),{type:"bar",data:{labels:lbl,datasets:[{data:v,backgroundColor:RC[r]+"CC",borderRadius:5,barPercentage:.6}]},options:o});
  $("ch").ontouchend=function(e){e.preventDefault();const h=chart.getElementsAtEventForMode(e.changedTouches[0],'nearest',{intersect:true},false);if(h.length)showT(r,towns[h[0].index])};}

function showT(r,town){curR=r;curT=town;curSec=null;if(chart){chart.destroy();chart=null}$("cB").style.display="none";renderC();
  setBc([{t:L.all,fn:showOv},{t:r,fn:()=>showR(r)},{t:town.n+" ("+town.c.toLocaleString()+")"}]);
  const pn=$("pn");pn.style.display="block";pn.className="an";
  const has=town.s.length>0;const sc={};if(has)town.s.forEach(s=>{const k=s[2]||'O';sc[k]=(sc[k]||0)+1});
  let h=`<div class="chips" id="cps"></div><div class="tb"><input type="text" id="q" placeholder="${L.sr}" oninput="af()">
    <button class="btn" onclick="dlC()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>CSV</button><span class="cnt" id="cn"></span></div>`;
  if(!has)h+=`<div class="empty">${L.fl}</div>`;else h+=`<div class="lst" id="sl"></div>`;
  if(town.c>town.s.length)h+=`<div class="inote">${L.sh} ${town.s.length} ${L.of} ${town.c.toLocaleString()} — ${L.fl}</div>`;
  h+=`<button class="bk" onclick="showR('${r}')">← ${L.bk} ${r}</button>`;
  pn.innerHTML=h;
  if(has){const fc=$("cps");mk("ALL",L.as,town.s.length,true);
    Object.entries(sc).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{if(k!=='O')mk(k,(L.sec[k]||k),v,false)});
    if(sc['O'])mk('O',(L.sec['O']||'Other'),sc['O'],false);
    function mk(k,lb,ct,on){const b=document.createElement("button");b.className="ch"+(on?" on":"");b.dataset.s=k;
      b.innerHTML=lb+`<span class="ct">${ct}</span>`;b.onclick=()=>{curSec=k==="ALL"?null:k;af()};fc.appendChild(b)}
    af()}}

function af(){if(!curT)return;const q=($("q")?.value||"").toLowerCase();
  document.querySelectorAll(".ch").forEach(b=>b.classList.toggle("on",curSec?b.dataset.s===curSec:b.dataset.s==="ALL"));
  const f=curT.s.filter(s=>{const ms=!curSec||s[2]===curSec;const mq=!q||s[0].toLowerCase().includes(q)||(s[1]&&s[1].toLowerCase().includes(q));return ms&&mq});
  renderRows(f);const c=$("cn");if(c)c.textContent=f.length+" / "+curT.c.toLocaleString()}

function renderRows(list){const el=$("sl");if(!el)return;
  if(!list.length){el.innerHTML=`<div class="empty">No matches</div>`;return}
  let h="";list.forEach(s=>{
    const nm=s[0],co=s[1],sec=s[2]||'O',tw=curT?.n||'',rg=curR||'';
    const enc=encodeURIComponent(nm+" "+(co||"")+" UK"),encJ=encodeURIComponent(nm);
    const k=fkey(nm,tw),isFav=favs.some(f=>f[0]===nm&&f[3]===tw);
    const st=statuses[k]||'',nt=notes[k]||'';
    const stCls=st?SC[st]||'':'';
    h+=`<div class="rw"><button class="fv ${isFav?"on":""}" onclick="togF(this,'${esc(nm)}','${esc(co)}','${sec}')">&#9733;</button>
      <div class="inf"><div class="nm" title="${nm.replace(/"/g,'&quot;')}">${nm}</div>
        <div class="mt"><span class="sc s${sec}">${L.sec[sec]||sec}</span>${co?`<span class="co">${co}</span>`:""}
          <select class="st-sel ${stCls}" onchange="setSt('${esc(nm)}','${tw}',this.value,this)" title="Status">
            <option value="">—</option>${SS.map(s=>`<option value="${s}"${st===s?' selected':''}>${s}</option>`).join('')}</select>
        </div>
        <input class="note-inp" placeholder="${L.nt}" value="${esc(nt)}" onchange="setNt('${esc(nm)}','${tw}',this.value)" onfocus="this.style.height='50px'" onblur="if(!this.value)this.style.height='24px'">
      </div>
      <div class="ac">
        <a class="ab ab-g" href="https://www.google.com/search?q=${enc}" target="_blank">Google ↗</a>
        <a class="ab ab-i" href="https://uk.indeed.com/jobs?q=${encJ}" target="_blank">Indeed ↗</a>
        <a class="ab ab-l" href="https://www.linkedin.com/jobs/search/?keywords=${encJ}&location=United+Kingdom" target="_blank">LinkedIn ↗</a>
        <a class="ab ab-r" href="https://www.reed.co.uk/jobs?keywords=${encJ}" target="_blank">Reed ↗</a>
      </div></div>`;
  });
  // Similar sponsors
  if(curSec && list.length>0){
    const others=curT.s.filter(s=>s[2]===curSec&&!list.slice(0,5).some(l=>l[0]===s[0])).slice(0,5);
    if(others.length){h+=`<div class="sim"><div class="sim-t">${L.sim}</div>`;
      others.forEach(s=>{const enc=encodeURIComponent(s[0]+" UK");
        h+=`<div class="sim-i"><span class="n">${s[0]}</span><a href="https://www.google.com/search?q=${enc}" target="_blank">Search ↗</a></div>`});
      h+=`</div>`}}
  el.innerHTML=h}

function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function togF(btn,nm,co,sec){const tw=curT?.n||'',rg=curR||'';
  const idx=favs.findIndex(f=>f[0]===nm&&f[3]===tw);
  if(idx>-1){favs.splice(idx,1);btn.classList.remove("on");toast(L.rm)}
  else{favs.push([nm,co,sec,tw,rg]);btn.classList.add("on");toast(L.ad)}
  localStorage.setItem('vt_f',JSON.stringify(favs));renderFP()}
function setSt(nm,tw,val,el){const k=fkey(nm,tw);if(val)statuses[k]=val;else delete statuses[k];
  localStorage.setItem('vt_s',JSON.stringify(statuses));el.className='st-sel '+(val?SC[val]||'':'');toast(val||'Status cleared')}
function setNt(nm,tw,val){const k=fkey(nm,tw);if(val)notes[k]=val;else delete notes[k];
  localStorage.setItem('vt_n',JSON.stringify(notes))}

function renderFP(){const bar=$("fP");$("fT").textContent=L.fv+" ("+favs.length+")";
  if(!favs.length){bar.classList.remove("sh");return}bar.classList.add("sh");
  const fl=$("fL");let h="";
  favs.forEach((f,i)=>{const k=fkey(f[0],f[3]),st=statuses[k]||'',nt=notes[k]||'';
    const stCls=st?SC[st]||'':'';
    h+=`<div class="fi"><span class="nm">${f[0]}</span><span class="tw">${f[3]}, ${f[4]}</span>
      ${st?`<span class="st ${stCls}">${st}</span>`:''}
      ${nt?`<span class="nt" title="${esc(nt)}">${nt}</span>`:''}
      <button class="rm" onclick="rmF(${i})">✕</button></div>`});
  fl.innerHTML=h}
function rmF(i){favs.splice(i,1);localStorage.setItem('vt_f',JSON.stringify(favs));renderFP();if(curT)af();toast(L.rm)}
function clrF(){favs=[];localStorage.setItem('vt_f','[]');renderFP();if(curT)af();toast(L.cld)}
function expCSV(){if(!favs.length)return;let c="Organisation,County,Sector,Town,Region,Status,Notes\n";
  favs.forEach(f=>{const k=fkey(f[0],f[3]);c+=`"${f[0]}","${f[1]}","${L.sec[f[2]]||f[2]}","${f[3]}","${f[4]}","${statuses[k]||''}","${(notes[k]||'').replace(/"/g,'""')}"\n`});
  dl(c,"shortlist.csv");toast(L.ex)}
function dlC(){if(!curT)return;const q=($("q")?.value||"").toLowerCase();
  const list=curT.s.filter(s=>{return(!curSec||s[2]===curSec)&&(!q||s[0].toLowerCase().includes(q))});
  let c="Organisation,County,Sector,Town,Region\n";list.forEach(s=>{c+=`"${s[0]}","${s[1]}","${L.sec[s[2]]||s[2]}","${curT.n}","${curR}"\n`});
  dl(c,(curT.n.toLowerCase().replace(/\s+/g,'_'))+"_sponsors.csv");toast(L.ex)}
function dl(c,fn){const b=new Blob(["\uFEFF"+c],{type:"text/csv;charset=utf-8;"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=fn;a.click();URL.revokeObjectURL(a.href)}
function printFav(){window.print()}

// Trends
function renderTrends(){
  const tp=$("trendsPanel");
  const tr=A.trends;
  if(!tr||!tr.added_count){tp.style.display="none";return}
  tp.style.display="block";
  const net=tr.net_change;const sign=net>0?"+":"";
  let h=`<div class="tp"><div class="tp-h">Sponsor trends <span class="badge-new">Updated</span></div>
    <div class="tp-stats">
      <div class="tp-stat nt"><div class="n">${tr.current_total.toLocaleString()}</div><div class="l">Total sponsors</div></div>
      <div class="tp-stat up"><div class="n">+${tr.added_count.toLocaleString()}</div><div class="l">New sponsors</div></div>
      <div class="tp-stat dn"><div class="n">-${tr.removed_count.toLocaleString()}</div><div class="l">Removed</div></div>
      <div class="tp-stat ${net>=0?'up':'dn'}"><div class="n">${sign}${net.toLocaleString()}</div><div class="l">Net change</div></div>
    </div>
    <div style="font-size:.7rem;color:var(--tx3);margin-bottom:.5rem">Comparing ${tr.previous_date} to ${tr.current_date}</div>`;
  
  // Region breakdown
  if(tr.added_by_area){
    h+=`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:.75rem;font-size:.72rem">`;
    for(const area of ['London','Manchester','West Yorkshire','Other']){
      const added=tr.added_by_area[area]||0;
      const removed=tr.removed_by_area[area]||0;
      if(added||removed){
        h+=`<span style="color:var(--tx2)">${area}: <span style="color:var(--gn)">+${added}</span> / <span style="color:var(--rd)">-${removed}</span></span>`;
      }
    }
    h+=`</div>`;
  }
  
  // Tabs for added/removed lists
  h+=`<div class="tp-tabs">
    <button class="tp-tab on" onclick="showTrendList('added',this)">New sponsors (${Math.min(tr.added_sponsors.length,200)})</button>
    <button class="tp-tab" onclick="showTrendList('removed',this)">Removed (${Math.min(tr.removed_sponsors.length,200)})</button>
  </div>
  <div class="tp-list" id="trendList"></div></div>`;
  tp.innerHTML=h;
  showTrendList('added',document.querySelector('.tp-tab'));
}

function showTrendList(type,btn){
  const tr=A.trends;if(!tr)return;
  document.querySelectorAll('.tp-tab').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  const list=type==='added'?tr.added_sponsors:tr.removed_sponsors;
  const dot=type==='added'?'add':'rem';
  const el=$("trendList");
  if(!list||!list.length){el.innerHTML=`<div class="empty">No data</div>`;return}
  let h="";
  list.forEach(s=>{
    h+=`<div class="tp-item"><span class="dot ${dot}"></span><span class="n">${s[0]}</span><span class="a">${s[1]} &middot; ${s[2]}</span></div>`;
  });
  el.innerHTML=h;
}

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'){e.preventDefault();const q=$("q");if(q)q.focus()}
  if(e.key==='Escape'){if(curT){showR(curR)}else if(curR){showOv()}}
});

// Init
applyTh(sysTh());
matchMedia('(prefers-color-scheme:light)').addEventListener('change',e=>{applyTh(e.matches?'light':'dark')});
L=LANGS.en;initLB();renderRoutes();showOv();renderFP();renderTrends();
</script>
</body>
</html>
